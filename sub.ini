; 这里的每一个组都在调用下方的“地区自动选路组”或直接调用节点
手动选择`select`香港`台湾`日本`新加坡`其它国家`机场选择`DIRECT`https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png
广告拦截`select`REJECT`DIRECT`https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Reject.png
Google`select`手动选择`香港`台湾`日本`新加坡`韩国`美国`其它国家`机场选择`DIRECT`https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google.png
Telegram`select`手动选择`香港`台湾`日本`新加坡`韩国`美国`其它国家`机场选择`DIRECT`https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png
抖音`select`手动选择`香港`台湾`日本`新加坡`韩国`美国`其它国家`机场选择`DIRECT`https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/TikTok.png
EMBY`select`手动选择`香港`台湾`日本`新加坡`韩国`美国`其它国家`机场选择`DIRECT`https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Emby.png
GPT`select`手动选择`香港`台湾`日本`新加坡`韩国`美国`其它国家`机场选择`DIRECT`https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ChatGPT.png

; --- 2. 核心逻辑点：排除特定机场的自动选路组 ---
; 你在原配置中使用了 (?!.*xlq)，这意味着这些组要过滤掉所有“星落穹”的节点
; 注意：ini 里的正则需要转换后端支持，这里使用了 !!CHINA 配合正则
香港`fallback`(?i)^(?!.*xlq).*(港|hk|hongkong|hong kong)`https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png`http://www.gstatic.com/generate_204`300
台湾`fallback`(?i)^(?!.*xlq).*(台|tw|taiwan)`https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/China.png`http://www.gstatic.com/generate_204`300
日本`fallback`(?i)^(?!.*xlq).*(日|jp|japan)`https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png`http://www.gstatic.com/generate_204`300
新加坡`fallback`(?i)^(?!.*xlq).*(新|sg|singapore)`https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png`http://www.gstatic.com/generate_204`300
美国`fallback`(?i)^(?!.*xlq).*(美|us|unitedstates|united states)`https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png`http://www.gstatic.com/generate_204`300
其它国家`select`(?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇨🇳|港|hk|hongkong|台|tw|taiwan|日|jp|japan|新|sg|singapore|美|us|unitedstates)).*`https://raw.githubusercontent.com/Orz-3/mini/master/Color/Global.png

; --- 3. 机场专用组（处理 proxy-providers 的核心） ---
; 你原配置中有个“机场选择”，可以手动切“星落穹”或其他
机场选择`select`星落穹`其他机场`https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Airport.png

; 星落穹单独成组，且有特定的 icon
星落穹`url-test`(?i)xlq`https://twilight.vvvv.ee/file/wallpaper_l/1775395915521_IMG_20260405_212847_926.jpg`http://www.gstatic.com/generate_204`300
; 其他机场组（整合一元、良心等）
其他机场`select`(?i)(1y|lx|nep|sous|69yun)`https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Airport.png

兜底`select`手动选择`DIRECT`https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png
全部节点`select`.*`https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Find_My.png

