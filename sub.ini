[custom]
; 基础 Meta 变量
dns_fake_ip_filter = "geoip:private,geosite:cn,*.lan,*.local,*.msftncsi.com,network-test.debian.org"

; --- 策略组逻辑 (基于你的核心：排除 xlq 与 独立 xlq) ---
; 手动选择组，引用后面生成的地区链
custom_proxy_group=手动选择`select`[]香港`[]台湾`[]日本`[]新加坡`[]美国`[]其它国家`[]机场选择`[]DIRECT

; 业务分流组
custom_proxy_group=Google`select`[]手动选择`[]香港`[]台湾`[]日本`[]新加坡`[]美国`[]DIRECT
custom_proxy_group=Telegram`select`[]手动选择`[]香港`[]台湾`[]日本`[]新加坡`[]美国`[]DIRECT
custom_proxy_group=EMBY`select`[]手动选择`[]香港`[]台湾`[]日本`[]新加坡`[]美国`[]DIRECT
custom_proxy_group=GPT`select`[]手动选择`[]香港`[]台湾`[]日本`[]新加坡`[]美国`[]DIRECT

; 地区组 (Misub 会在 <%region_strategy_chain%> 中处理，但由于你有排除 xlq 的刚需，建议手动定义)
custom_proxy_group=香港`fallback`(?i)^(?!.*xlq).*(港|hk|hongkong)`http://www.gstatic.com/generate_204`300
custom_proxy_group=台湾`fallback`(?i)^(?!.*xlq).*(台|tw|taiwan)`http://www.gstatic.com/generate_204`300
custom_proxy_group=日本`fallback`(?i)^(?!.*xlq).*(日|jp|japan)`http://www.gstatic.com/generate_204`300
custom_proxy_group=新加坡`fallback`(?i)^(?!.*xlq).*(新|sg|singapore)`http://www.gstatic.com/generate_204`300
custom_proxy_group=美国`fallback`(?i)^(?!.*xlq).*(美|us|unitedstates)`http://www.gstatic.com/generate_204`300

; 机场独立组
custom_proxy_group=机场选择`select`[]星落穹`[]其他机场
custom_proxy_group=星落穹`url-test`(?i)xlq`http://www.gstatic.com/generate_204`300
custom_proxy_group=其他机场`select`[]NEP`[]一元`[]良心`[]69`[]嗖嗖

; --- 规则逻辑 (利用 <%rules%> 插入) ---
; 这里把你的 EMoS 私有规则强行置顶，防止被自动生成的规则覆盖
ruleset=🎯 EMoS直连,[]DOMAIN,emos.club
ruleset=🎯 EMoS直连,[]DOMAIN,prlon.com
ruleset=🎯 EMoS直连,[]DOMAIN,hellohk.me
ruleset=🎯 EMoS直连,[]DOMAIN,live.emos.best
ruleset=🎯 EMoS直连,[]DOMAIN-SUFFIX,xixibb.com

; 剩下的交给 Misub 的自动规则变量
<%rules%>

; 补齐你原配置里的那些特殊 MRS
ruleset=Google,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs
ruleset=Telegram,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs
ruleset=EMBY,https://raw.githubusercontent.com/binaryu/emos-proxy-rule/main/rules/emos-mihomo.mrs

; 最终兜底
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 兜底,[]FINAL
